<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#E8C456;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A87820;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="180" fill="#0D0D0D"/>

  <!-- Art Deco top ornament - center -->
  <g transform="translate(300, 18)">
    <!-- Central diamond -->
    <polygon points="0,-8 5,0 0,8 -5,0" fill="url(#goldGrad)"/>
    <!-- Side lines -->
    <rect x="-60" y="-0.8" width="50" height="1.6" fill="url(#goldGrad)" opacity="0.8"/>
    <rect x="10" y="-0.8" width="50" height="1.6" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Small diamonds on sides -->
    <polygon points="-65,-4 -61,0 -65,4 -69,0" fill="url(#goldGrad)" opacity="0.7"/>
    <polygon points="65,-4 69,0 65,4 61,0" fill="url(#goldGrad)" opacity="0.7"/>
    <!-- Outer lines -->
    <rect x="-110" y="-0.5" width="35" height="1" fill="url(#goldGrad)" opacity="0.4"/>
    <rect x="75" y="-0.5" width="35" height="1" fill="url(#goldGrad)" opacity="0.4"/>
  </g>

  <!-- Double border lines top -->
  <rect x="30" y="28" width="540" height="1" fill="url(#goldGrad)" opacity="0.6"/>
  <rect x="30" y="31" width="540" height="0.5" fill="url(#goldGrad)" opacity="0.3"/>

  <!-- Main title: DESPACHO DE NOÉ -->
  <text x="300" y="95"
    font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="38"
    font-weight="400"
    letter-spacing="12"
    text-anchor="middle"
    fill="url(#goldGrad)">DESPACHO DE NOÉ</text>

  <!-- Thin decorative subtitle line -->
  <g transform="translate(300, 112)">
    <rect x="-80" y="0" width="70" height="0.6" fill="url(#goldGrad)" opacity="0.5"/>
    <polygon points="0,-3.5 3.5,0 0,3.5 -3.5,0" fill="url(#goldGrad)"/>
    <rect x="10" y="0" width="70" height="0.6" fill="url(#goldGrad)" opacity="0.5"/>
  </g>

  <!-- Tagline -->
  <text x="300" y="132"
    font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
    font-size="11"
    font-weight="300"
    letter-spacing="6"
    text-anchor="middle"
    fill="#C9A84C"
    opacity="0.85">OPINIONES · RECOMENDACIONES · HISTORIAS · CONVERSACIONES</text>

  <!-- Double border lines bottom -->
  <rect x="30" y="147" width="540" height="0.5" fill="url(#goldGrad)" opacity="0.3"/>
  <rect x="30" y="150" width="540" height="1" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Art Deco bottom ornament -->
  <g transform="translate(300, 162)">
    <polygon points="0,-8 5,0 0,8 -5,0" fill="url(#goldGrad)"/>
    <rect x="-60" y="-0.8" width="50" height="1.6" fill="url(#goldGrad)" opacity="0.8"/>
    <rect x="10" y="-0.8" width="50" height="1.6" fill="url(#goldGrad)" opacity="0.8"/>
    <polygon points="-65,-4 -61,0 -65,4 -69,0" fill="url(#goldGrad)" opacity="0.7"/>
    <polygon points="65,-4 69,0 65,4 61,0" fill="url(#goldGrad)" opacity="0.7"/>
    <rect x="-110" y="-0.5" width="35" height="1" fill="url(#goldGrad)" opacity="0.4"/>
    <rect x="75" y="-0.5" width="35" height="1" fill="url(#goldGrad)" opacity="0.4"/>
  </g>
</svg>
